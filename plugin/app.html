<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0e1118;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(126, 200, 255, 0.95) rgba(12, 18, 29, 0.85);
    }

    #root::-webkit-scrollbar,
    textarea::-webkit-scrollbar,
    pre::-webkit-scrollbar {
      width: 11px;
      height: 11px;
    }

    #root::-webkit-scrollbar-track,
    textarea::-webkit-scrollbar-track,
    pre::-webkit-scrollbar-track {
      background: rgba(12, 18, 29, 0.92);
      border-left: 1px solid rgba(126, 200, 255, 0.08);
      border-radius: 999px;
    }

    #root::-webkit-scrollbar-thumb,
    textarea::-webkit-scrollbar-thumb,
    pre::-webkit-scrollbar-thumb {
      background: rgba(126, 200, 255, 0.88);
      border: 2px solid rgba(12, 18, 29, 0.9);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06), 0 0 14px rgba(126, 200, 255, 0.22);
    }

    #root::-webkit-scrollbar-thumb:hover,
    textarea::-webkit-scrollbar-thumb:hover,
    pre::-webkit-scrollbar-thumb:hover {
      background: rgba(154, 219, 255, 0.96);
    }

    #root::-webkit-scrollbar-corner,
    textarea::-webkit-scrollbar-corner,
    pre::-webkit-scrollbar-corner {
      background: rgba(12, 18, 29, 0.92);
    }
  </style>
</head>
<body>
  <div id="root">
    <div
      style="
        display:flex;
        align-items:center;
        justify-content:center;
        width:100%;
        height:100%;
        color:#90a4bf;
        font:13px 'Segoe UI', sans-serif;
      "
    >
      正在加载...
    </div>
  </div>
  <script src="app-shell.js"></script>
  <script src="app.js"></script>
</body>
</html>
